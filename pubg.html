<!DOCTYPE html>
<html>
<head>
  <title>Topup PUBG Mobile Murah | UC PUBG Cepat</title>
  <meta name="description" content="Topup UC PUBG Mobile murah dan cepat. Proses via WhatsApp, aman dan terpercaya.">
  <link rel="stylesheet" href="styles/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body data-game="pubg">
<div id="notif">✔ Item dipilih</div>
<h1>🎯 PUBG MOBILE TOPUP</h1>

<div class="grid">

  <div class="product-card">
    <img src="assets/pubg1.jpg">
    <h3>30 UC</h3>
    <p class="price">Rp9.000</p>
    <button onclick="buy('PUBG Mobile','30 UC - Rp9.000')">Beli</button>
  </div>

  <div class="product-card">
    <img src="assets/pubg2.jpg">
    <h3>60 UC</h3>
    <p class="price">Rp17.000</p>
    <button onclick="buy('PUBG Mobile','60 UC - Rp17.000')">Beli</button>
  </div>

  <div class="product-card">
    <img src="assets/pubg3.jpg">
    <h3>600 UC + 60 UC</h3>
    <p class="price">Rp155.000</p>
    <button onclick="buy('PUBG Mobile','600 UC + 60 UC - Rp155.000')">Beli</button>
  </div>

  <div class="product-card">
    <img src="assets/pubg1.jpg">
    <h3>1500 UC + 300 UC</h3>
    <p class="price">Rp385.000</p>
    <button onclick="buy('PUBG Mobile','1500 UC + 300 UC - Rp385.000')">Beli</button>
  </div>

  <div class="product-card">
    <img src="assets/pubg2.jpg">
    <h3>3000 UC + 850 UC</h3>
    <p class="price">Rp770.000</p>
    <button onclick="buy('PUBG Mobile','3000 UC + 850 UC - Rp770.000')">Beli</button>
  </div>

  <div class="product-card">
    <img src="assets/pubg3.jpg">
    <h3>6000 UC + 2100 UC</h3>
    <p class="price">Rp1.530.000</p>
    <button onclick="buy('PUBG Mobile','6000 UC + 2100 UC - Rp1.530.000')">Beli</button>
  </div>

</div>

<div class="card" id="orderForm">
  <input type="text" id="userId" placeholder="Masukkan ID PUBG">
  <input type="text" id="qty" inputmode="numeric" pattern="[0-9]*" placeholder="Masukkan Jumlah Topup">
  <p id="selectedItem"></p>
  <button onclick="order()">ORDER VIA WHATSAPP</button>
</div>

<script src="js/main.js"></script>
<audio id="clickSound" src="assets/click.wav"></audio>
<div id="loading">
  <div class="loader"></div>
  <p>Memproses pesanan...</p>
</div>
</body>
</html>
