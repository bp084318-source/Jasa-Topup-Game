<!DOCTYPE html>
<html>
<head>
  <title>Topup Free Fire Murah | Diamond FF Cepat</title>
  <meta name="description" content="Topup Free Fire murah dan cepat. Diamond FF harga terbaik proses cepat via WhatsApp.">
  <link rel="stylesheet" href="styles/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body data-game="ff">
<div id="notif">✔ Item dipilih</div>
<h1>🔥 FREE FIRE TOPUP</h1>

<div class="grid">

  <!-- WDP / MEMBER -->
  <div class="product-card">
    <img src="assets/wdp.jpg">
    <h3>Member Mingguan</h3>
    <p class="price">Rp32.000</p>
    <button onclick="buy('Free Fire','Member Mingguan - Rp32.000')">Beli</button>
  </div>

  <!-- DIAMOND -->
  <div class="product-card">
    <img src="assets/item1.jpg">
    <h3>5 Diamond</h3>
    <p class="price">Rp2.000</p>
    <button onclick="buy('Free Fire','5 Diamond - Rp2.000')">Beli</button>
  </div>

  <div class="product-card">
    <img src="assets/item2.jpg">
    <h3>12 Diamond</h3>
    <p class="price">Rp3.000</p>
    <button onclick="buy('Free Fire','12 Diamond - Rp3.000')">Beli</button>
  </div>

  <div class="product-card">
    <img src="assets/item3.jpg">
    <h3>50 Diamond</h3>
    <p class="price">Rp10.000</p>
    <button onclick="buy('Free Fire','50 Diamond - Rp10.000')">Beli</button>
  </div>

  <div class="product-card">
    <img src="assets/item1.jpg">
    <h3>70 Diamond</h3>
    <p class="price">Rp13.000</p>
    <button onclick="buy('Free Fire','70 Diamond - Rp13.000')">Beli</button>
  </div>

  <div class="product-card">
    <img src="assets/item2.jpg">
    <h3>140 Diamond</h3>
    <p class="price">Rp26.000</p>
    <button onclick="buy('Free Fire','140 Diamond - Rp26.000')">Beli</button>
  </div>

</div>

<div class="card" id="orderForm">
  <input type="text" id="userId" placeholder="Masukkan ID Free Fire">
  <input type="number" id="qty" placeholder="Jumlah topup (opsional)">
  <p id="selectedItem"></p>
  <button onclick="order()">ORDER VIA WHATSAPP</button>
</div>

<script src="js/main.js"></script>
<audio id="clickSound" src="assets/click.wav"></audio>
</body>
</html>
