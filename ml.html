<!DOCTYPE html>
<html>
<head>
  <title>Topup Mobile Legends Murah | Diamond ML Cepat</title>
  <meta name="description" content="Topup Mobile Legends murah, diamond ML cepat dan aman. Weekly Diamond Pass tersedia.">
  <link rel="stylesheet" href="styles/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body data-game="ml">
<div id="notif">✔ Item dipilih</div>
<h1>⚔️ MOBILE LEGENDS TOPUP</h1>

<div class="grid">

  <!-- WDP -->
  <div class="product-card">
    <img src="assets/wdp.jpg">
    <h3>Weekly Diamond Pass</h3>
    <p class="price">Rp28.000</p>
    <button onclick="buy('Mobile Legends','Weekly Diamond Pass - Rp28.000')">Beli</button>
  </div>

  <!-- 5 DM -->
  <div class="product-card">
    <img src="assets/ml1.jpg">
    <h3>5 Diamond</h3>
    <p class="price">Rp2.500</p>
    <button onclick="buy('Mobile Legends','5 Diamond - Rp2.500')">Beli</button>
  </div>

  <!-- 12 DM -->
  <div class="product-card">
    <img src="assets/ml2.jpg">
    <h3>12 Diamond</h3>
    <p class="price">Rp5.000</p>
    <button onclick="buy('Mobile Legends','12 Diamond - Rp5.000')">Beli</button>
  </div>

  <!-- 36 DM -->
  <div class="product-card">
    <img src="assets/ml3.jpg">
    <h3>36 Diamond</h3>
    <p class="price">Rp11.000</p>
    <button onclick="buy('Mobile Legends','36 Diamond - Rp13.000')">Beli</button>
  </div>

  <!-- 74 DM -->
  <div class="product-card">
    <img src="assets/ml1.jpg">
    <h3>74 Diamond</h3>
    <p class="price">Rp21.000</p>
    <button onclick="buy('Mobile Legends','74 Diamond - Rp23.000')">Beli</button>
  </div>

  <!-- 100 DM -->
  <div class="product-card">
    <img src="assets/ml2.jpg">
    <h3>100 Diamond</h3>
    <p class="price">Rp31.000</p>
    <button onclick="buy('Mobile Legends','99 Diamond - Rp40.000')">Beli</button>
  </div>

  <!-- 296 DM -->
  <div class="product-card">
    <img src="assets/ml3.jpg">
    <h3>296 Diamond</h3>
    <p class="price">Rp86.000</p>
    <button onclick="buy('Mobile Legends','374 Diamond - Rp108.000')">Beli</button>
  </div>

  <!-- 370 DM -->
  <div class="product-card">
    <img src="assets/ml1.jpg">
    <h3>370 Diamond</h3>
    <p class="price">Rp97.000</p>
    <button onclick="buy('Mobile Legends','408 Diamond - Rp117.000')">Beli</button>
  </div>

  <!-- 966 DM -->
  <div class="product-card">
    <img src="assets/ml2.jpg">
    <h3>966 Diamond</h3>
    <p class="price">Rp240.000</p>
    <button onclick="buy('Mobile Legends','966 Diamond - Rp273.000')">Beli</button>
  </div>

</div>

<div class="card" id="orderForm">
  <input type="text" id="userId" inputmode="numeric" pattern="[0-9]*" placeholder="Masukkan ID">
  <input type="text" id="serverId" inputmode="numeric" pattern="[0-9]*" placeholder="Masukkan ID Server">
  <p id="selectedItem"></p>
  <button onclick="order()">ORDER VIA WHATSAPP</button>
</div>

<script src="js/main.js"></script>
<audio id="clickSound" src="assets/click.wav"></audio>
<div id="loading">
  <div class="loader"></div>
  <p>Memproses pesanan...</p>
</div>
</body>
</html>
